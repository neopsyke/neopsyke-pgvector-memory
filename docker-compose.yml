services:
  pgvector:
    image: ${PGVECTOR_BOOTSTRAP_DOCKER_IMAGE:-pgvector/pgvector:pg17}
    container_name: ${PGVECTOR_BOOTSTRAP_CONTAINER_NAME:-neopsyke-pgvector-memory-db}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGVECTOR_BOOTSTRAP_DB_NAME:-neopsyke_memory}
      POSTGRES_USER: ${PGVECTOR_DB_USER:-neopsyke}
      POSTGRES_PASSWORD: ${PGVECTOR_DB_PASSWORD:-neopsyke_dev}
    ports:
      - "${PGVECTOR_BOOTSTRAP_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_DB_USER:-neopsyke} -d ${PGVECTOR_BOOTSTRAP_DB_NAME:-neopsyke_memory}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  pgvector-data:
    name: ${PGVECTOR_BOOTSTRAP_VOLUME_NAME:-neopsyke-pgvector-memory-data}
