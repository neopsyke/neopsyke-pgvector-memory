name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check shell scripts
        run: bash -n scripts/run-http-provider.sh scripts/run-mcp-provider.sh

      - name: Build release artifacts
        run: ./gradlew --no-daemon checkKotlinGradlePluginConfigurationErrors test fatJar releaseBundleZip

      - name: Generate SHA-256 checksums
        run: |
          mkdir -p build/release
          shasum -a 256 \
            build/libs/neopsyke-pgvector-memory-*-all.jar \
            build/distributions/neopsyke-pgvector-memory-*-bundle.zip \
            > build/release/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          files=(
            build/libs/neopsyke-pgvector-memory-*-all.jar
            build/distributions/neopsyke-pgvector-memory-*-bundle.zip
            build/release/SHA256SUMS
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --generate-notes --verify-tag
          fi
