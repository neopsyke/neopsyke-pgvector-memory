name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Check shell scripts
        run: bash -n scripts/run-http-provider.sh scripts/run-mcp-provider.sh

      - name: Build release artifacts
        run: ./gradlew --no-daemon checkKotlinGradlePluginConfigurationErrors test fatJar releaseBundleZip

      - name: Generate SHA-256 checksums
        run: |
          mkdir -p build/release
          shasum -a 256 \
            build/libs/neopsyke-pgvector-memory-*-all.jar \
            build/distributions/neopsyke-pgvector-memory-*-bundle.zip \
            > build/release/SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/neopsyke-pgvector-memory-*-all.jar
            build/distributions/neopsyke-pgvector-memory-*-bundle.zip
            build/release/SHA256SUMS
